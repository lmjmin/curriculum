<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>회원가입</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>회원가입</h1>
<hr>

<form action="/signup" method="post" onsubmit="return checkPw()">
    <table border="1">
        <tr>
            <th>아이디</th>
            <td><input type="text" name="userId" required placeholder="아이디 입력"></td>
        </tr>
        <tr>
            <th>비밀번호</th>
            <td><input type="password" name="pw" required placeholder="비밀번호 입력"></td>
        </tr>
        <tr>
            <th>비밀번호 확인</th>
            <td><input type="password" id="pw2" required></td>
        </tr>
        <tr>
            <th>이름</th>
            <td><input type="text" name="name" required></td>
        </tr>
        <tr>
        	<th>생년월일</th>
        	<td><input type="date" name="birth" required></td>
        </tr>
        <tr>
            <th>이메일</th>
            <td><input type="email" name="email" required placeholder="example@email.com"></td>
        </tr>
        <tr>
            <th>전화번호</th>
            <td>
                <input type="text" name="phone" maxlength="13"
                       oninput="formatPhone(this)" placeholder="010-1234-5678">
            </td>
        </tr>
        <tr>
            <th>학력</th>
            <td>
                <select name="education">
                    <option value="">선택하세요</option>
                    <option value="초졸">초졸</option>
                    <option value="중졸">중졸</option>
                    <option value="고졸">고졸</option>
                    <option value="대졸">대졸</option>
                    <option value="대학원">대학원</option>
                </select>
            </td>
        </tr>
        <tr>
            <th>보유 스킬</th>
            <td><input type="text" name="skill"></td>
        </tr>
        <tr>
            <th>희망 직무</th>
            <td><input type="text" name="desiredJob"></td>
        </tr>
        <tr>
            <th>희망 근무지</th>
            <td><input type="text" name="desiredArea"></td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="회원가입">
                <button type="button" onclick="location.href='/loginForm'">로그인으로</button>
            </td>
        </tr>
    </table>
</form>

<script>
function formatPhone(input) {
    let value = input.value.replace(/[^0-9]/g, "");
    if (value.length < 4) input.value = value;
    else if (value.length < 8)
        input.value = value.slice(0, 3) + "-" + value.slice(3);
    else
        input.value = value.slice(0, 3) + "-" + value.slice(3, 7) + "-" + value.slice(7, 11);
}

function checkPw() {
    const pw = document.querySelector("input[name='pw']").value;
    const pw2 = document.getElementById("pw2").value;
    if (pw !== pw2) {
        alert("비밀번호가 일치하지 않습니다");
        return false;
    }
    return true;
}
</script>

</body>
</html>
