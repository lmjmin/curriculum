<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>자기소개서 작성</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>자기소개서 작성</h1>
<hr>

<form action="/introWrite" method="post">
    <table border="1">
        <tr>
            <th>제목</th>
            <td><input type="text" name="title" required></td>
        </tr>
        <tr>
            <th>회사명</th>
            <td><input type="text" name="company" required></td>
        </tr>
        <tr>
            <th>직무</th>
            <td><input type="text" name="job" required></td>
        </tr>
        <tr>
            <th>항목명</th>
            <td>
                <input type="text" name="itemName" placeholder="예: 지원동기" required>
            </td>
        </tr>
        <tr>
            <th>내용</th>
            <td>
                <textarea name="contentText" rows="10" cols="60" required></textarea>
            </td>
        </tr>
        <tr>
            <td colspan="2">
                <input type="submit" value="작성 완료">
                <button type="button" onclick="location.href='/introList'">목록으로</button>
            </td>
        </tr>
    </table>
</form>

</body>
</html>
