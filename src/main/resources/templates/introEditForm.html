<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>자기소개서 수정</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>자기소개서 수정</h1>
<hr>

<form action="/introEdit" method="post">

    <input type="hidden" name="introId" th:value="${introDto.introId}">

    <table border="1">
        <tr>
            <th>제목</th>
            <td>
                <input type="text" name="title" th:value="${introDto.title}" required>
            </td>
        </tr>
        <tr>
            <th>회사명</th>
            <td>
                <input type="text" name="company" th:value="${introDto.company}" required>
            </td>
        </tr>
        <tr>
            <th>직무</th>
            <td>
                <input type="text" name="job" th:value="${introDto.job}" required>
            </td>
        </tr>
    </table>

    <br>

    <input type="submit" value="수정 완료">
    <button type="button"
        th:onclick="|location.href='@{/introDetail(introId=${introDto.introId})}'|">
        취소
    </button>

</form>

</body>
</html>
